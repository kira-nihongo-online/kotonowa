<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kotonowa</title>
    <meta name="description" content="Kotonowa - Connect People Through Words">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Kotonowa</h1>
        <p>Connect People Through Words</p>
    </header>

    <main>

        <textarea
            id="inputText"
            placeholder="Enter text..."
            rows="6"></textarea>

        <div class="buttons">
            <button id="micButton">🎤 Voice</button>
            <button id="translateButton">🌐 Translate</button>
        </div>

        <section id="resultArea">
            <h2>Translation</h2>
            <div id="translatedText"></div>
        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
